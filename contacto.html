      <div class="contact-grid">
        <!-- Contact form -->
        <div class="fade-in">
          <!--
            CONTACT FORM — Static HTML form for GitHub Pages.
            ---------------------------------------------------
            TO MAKE IT FUNCTIONAL:
            Replace the action attribute with a form backend URL.
            Recommended: use Formspree (formspree.io) — it's free
            for basic usage and works perfectly with static sites.

            Example Formspree action:
            <form action="https://formspree.io/f/YOUR-FORM-ID" method="POST">

            Alternatively, you can use a serverless function
            (Cloudflare Workers, Vercel, Netlify Functions, etc.)
            to handle form submissions.
          -->
          <form class="contact-form" action="https://formspree.io/f/xvgbagja" method="POST" onsubmit="alert('Obrigado! Será respondido brevemente.');">
            <div class="form-group">
              <label for="contact-name" class="form-group__label">Nome</label>
              <input id="contact-name" type="text" name="NicholasMoraes_Name" class="form-group__input" required>
            </div>

            <div class="form-group">
              <label for="contact-email" class="form-group__label">Email</label>
              <input id="contact-email" type="email" name="NicholasMoraes_Email" class="form-group__input" required>
            </div>

            <div class="form-group">
              <label for="contact-subject" class="form-group__label">Assunto</label>
              <input id="contact-subject" type="text" name="subject" class="form-group__input" required>
            </div>

            <div class="form-group">
              <label for="contact-message" class="form-group__label">Mensagem</label>
              <textarea id="contact-message" name="NicholasMoraes_Message" class="form-group__textarea" required></textarea>
            </div>

            <button type="submit" class="btn btn--primary" style="align-self: flex-start;">
              Enviar Mensagem
            </button>
          </form>

          <!--
            NOTE FOR THE DEVELOPER:
            When you connect a real form backend, remember to:
            - Add method="POST" to the <form> tag
            - Set the action to your backend URL
            - Optionally add a hidden redirect or success message
            - Remove the onsubmit fallback if you add a real action
          -->
        </div>
